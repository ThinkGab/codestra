<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <defs>
    <linearGradient id="archBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
    <linearGradient id="leaderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b2ff7"/>
      <stop offset="100%" style="stop-color:#00d2ff"/>
    </linearGradient>
    <linearGradient id="workerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#0a84ff"/>
    </linearGradient>
    <linearGradient id="msgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#e94560"/>
    </linearGradient>
    <filter id="archGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" fill="#f5a623">
      <polygon points="0 0, 8 3, 0 6"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" fill="#00d2ff">
      <polygon points="0 0, 8 3, 0 6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" fill="#7b2ff7">
      <polygon points="0 0, 8 3, 0 6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="600" fill="url(#archBg)" rx="12"/>

  <!-- Title -->
  <text x="500" y="45" text-anchor="middle" font-family="'Georgia', serif" font-size="28" fill="#e94560" font-weight="bold" letter-spacing="3">CODESTRA ARCHITECTURE</text>
  <text x="500" y="68" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#8b949e">Hub &amp; Spoke — Multi-Instance Orchestration</text>

  <!-- ═══ HUB (center) ═══ -->
  <g filter="url(#shadow)">
    <rect x="380" y="195" width="240" height="140" rx="16" fill="#1c2333" stroke="url(#hubGrad)" stroke-width="2.5"/>
  </g>
  <!-- Hub icon: antenna/broadcast -->
  <circle cx="500" cy="235" r="18" fill="none" stroke="url(#hubGrad)" stroke-width="2"/>
  <circle cx="500" cy="235" r="10" fill="url(#hubGrad)" opacity="0.3"/>
  <circle cx="500" cy="235" r="5" fill="url(#hubGrad)"/>
  <!-- Broadcast waves -->
  <path d="M 480 218 Q 470 205 480 192" stroke="#e94560" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 520 218 Q 530 205 520 192" stroke="#f5a623" stroke-width="1.5" fill="none" opacity="0.5"/>

  <text x="500" y="275" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" fill="#fff" font-weight="bold">SWARM HUB</text>
  <text x="500" y="295" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b949e">HTTP :7800</text>

  <!-- Hub internal boxes -->
  <rect x="395" y="305" width="65" height="20" rx="4" fill="#e94560" opacity="0.2" stroke="#e94560" stroke-width="0.8"/>
  <text x="427" y="319" text-anchor="middle" font-family="monospace" font-size="9" fill="#e94560">Registry</text>
  <rect x="468" y="305" width="65" height="20" rx="4" fill="#f5a623" opacity="0.2" stroke="#f5a623" stroke-width="0.8"/>
  <text x="500" y="319" text-anchor="middle" font-family="monospace" font-size="9" fill="#f5a623">Messages</text>
  <rect x="540" y="305" width="65" height="20" rx="4" fill="#00d2ff" opacity="0.2" stroke="#00d2ff" stroke-width="0.8"/>
  <text x="572" y="319" text-anchor="middle" font-family="monospace" font-size="9" fill="#00d2ff">Status</text>

  <!-- ═══ LEADER (top) ═══ -->
  <g filter="url(#shadow)">
    <rect x="400" y="85" width="200" height="80" rx="12" fill="#1c2333" stroke="url(#leaderGrad)" stroke-width="2"/>
  </g>
  <!-- Mini Maestro in leader box -->
  <g transform="translate(432, 108) scale(0.3)">
    <!-- Head -->
    <ellipse cx="0" cy="-12" rx="12" ry="14" fill="#ffd5c2"/>
    <!-- Curly white hair -->
    <g fill="#e8e8e8" stroke="#ccc" stroke-width="0.4">
      <ellipse cx="0" cy="-26" rx="18" ry="8"/>
      <path d="M -15 -18 Q -22 -14 -24 -4 Q -26 6 -22 16 Q -20 10 -22 2 Q -24 -6 -18 -14 Z"/>
      <path d="M 15 -18 Q 22 -14 24 -4 Q 26 6 22 16 Q 20 10 22 2 Q 24 -6 18 -14 Z"/>
    </g>
    <!-- Round glasses -->
    <circle cx="-5" cy="-13" r="6" fill="none" stroke="#f5a623" stroke-width="1.2"/>
    <circle cx="5" cy="-13" r="6" fill="none" stroke="#f5a623" stroke-width="1.2"/>
    <!-- Happy eyes -->
    <path d="M -7 -14 Q -5 -16 -3 -14" stroke="#1a1a2e" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <path d="M 3 -14 Q 5 -16 7 -14" stroke="#1a1a2e" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <!-- Smile -->
    <path d="M -5 -6 Q 0 -1 5 -6" stroke="#c4846b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Body -->
    <path d="M 0 5 L 0 30" stroke="#1a1a2e" stroke-width="8"/>
    <path d="M -3 7 L 0 3 L 3 7" fill="#f5a623"/>
    <!-- Arms -->
    <path d="M -3 15 L -20 -5" stroke="#ffd5c2" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 3 15 L 22 -2" stroke="#ffd5c2" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <line x1="23" y1="-4" x2="35" y2="-18" stroke="#00d2ff" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="520" y="120" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#fff" font-weight="bold">IL MAESTRO</text>
  <text x="520" y="140" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">Claude Code + MCP</text>
  <text x="520" y="155" text-anchor="middle" font-family="monospace" font-size="10" fill="#7b2ff7">Spawns &amp; Coordinates</text>

  <!-- Leader → Hub arrow -->
  <line x1="500" y1="165" x2="500" y2="192" stroke="#7b2ff7" stroke-width="2" marker-end="url(#arrowPurple)" stroke-dasharray="6,3">
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <text x="530" y="183" font-family="monospace" font-size="9" fill="#7b2ff7" opacity="0.8">MCP</text>

  <!-- ═══ WORKERS ═══ -->

  <!-- Worker 1 (bottom-left) -->
  <g filter="url(#shadow)">
    <rect x="80" y="420" width="180" height="80" rx="12" fill="#1c2333" stroke="url(#workerGrad)" stroke-width="2"/>
  </g>
  <text x="130" y="447" font-family="monospace" font-size="20" fill="#00d2ff">⚡</text>
  <text x="190" y="450" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#fff" font-weight="bold">Worker 1</text>
  <text x="170" y="470" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">review src/api/</text>
  <rect x="95" y="478" width="50" height="14" rx="7" fill="#00d2ff" opacity="0.2" stroke="#00d2ff" stroke-width="0.8"/>
  <text x="120" y="489" text-anchor="middle" font-family="monospace" font-size="8" fill="#00d2ff">working</text>

  <!-- Worker 2 (bottom-center) -->
  <g filter="url(#shadow)">
    <rect x="320" y="440" width="180" height="80" rx="12" fill="#1c2333" stroke="url(#workerGrad)" stroke-width="2"/>
  </g>
  <text x="370" y="467" font-family="monospace" font-size="20" fill="#00d2ff">⚡</text>
  <text x="430" y="470" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#fff" font-weight="bold">Worker 2</text>
  <text x="410" y="490" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">test coverage</text>
  <rect x="335" y="498" width="50" height="14" rx="7" fill="#00d2ff" opacity="0.2" stroke="#00d2ff" stroke-width="0.8"/>
  <text x="360" y="509" text-anchor="middle" font-family="monospace" font-size="8" fill="#00d2ff">working</text>

  <!-- Worker 3 (bottom-right) -->
  <g filter="url(#shadow)">
    <rect x="560" y="420" width="180" height="80" rx="12" fill="#1c2333" stroke="url(#workerGrad)" stroke-width="2"/>
  </g>
  <text x="610" y="447" font-family="monospace" font-size="20" fill="#4ade80">✓</text>
  <text x="670" y="450" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#fff" font-weight="bold">Worker 3</text>
  <text x="650" y="470" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">lint &amp; format</text>
  <rect x="575" y="478" width="40" height="14" rx="7" fill="#4ade80" opacity="0.2" stroke="#4ade80" stroke-width="0.8"/>
  <text x="595" y="489" text-anchor="middle" font-family="monospace" font-size="8" fill="#4ade80">done</text>

  <!-- Remote worker (far right) -->
  <g filter="url(#shadow)">
    <rect x="800" y="230" width="170" height="80" rx="12" fill="#1c2333" stroke="#f5a623" stroke-width="2" stroke-dasharray="6,3"/>
  </g>
  <text x="845" y="257" font-family="monospace" font-size="18" fill="#f5a623">🌐</text>
  <text x="905" y="260" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#fff" font-weight="bold">Remote W4</text>
  <text x="885" y="280" text-anchor="middle" font-family="monospace" font-size="10" fill="#8b949e">192.168.1.42</text>
  <rect x="815" y="288" width="40" height="14" rx="7" fill="#f5a623" opacity="0.2" stroke="#f5a623" stroke-width="0.8"/>
  <text x="835" y="299" text-anchor="middle" font-family="monospace" font-size="8" fill="#f5a623">LAN</text>

  <!-- ═══ Connection lines ═══ -->

  <!-- Hub → Worker 1 -->
  <path d="M 420 335 Q 300 380 200 420" stroke="#00d2ff" stroke-width="1.8" fill="none" marker-end="url(#arrowCyan)" stroke-dasharray="6,3">
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Hub → Worker 2 -->
  <path d="M 500 335 Q 450 390 420 440" stroke="#00d2ff" stroke-width="1.8" fill="none" marker-end="url(#arrowCyan)" stroke-dasharray="6,3">
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="2.2s" repeatCount="indefinite"/>
  </path>

  <!-- Hub → Worker 3 -->
  <path d="M 580 335 Q 620 380 630 420" stroke="#00d2ff" stroke-width="1.8" fill="none" marker-end="url(#arrowCyan)" stroke-dasharray="6,3">
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="1.8s" repeatCount="indefinite"/>
  </path>

  <!-- Hub → Remote Worker -->
  <path d="M 620 265 L 797 265" stroke="#f5a623" stroke-width="1.8" fill="none" marker-end="url(#arrowOrange)" stroke-dasharray="6,3">
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <text x="710" y="258" font-family="monospace" font-size="9" fill="#f5a623" opacity="0.7">HTTP/LAN</text>

  <!-- Message bubble: Worker 3 → Hub (result) -->
  <g transform="translate(660, 380)">
    <rect x="0" y="0" width="100" height="26" rx="6" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="0.8"/>
    <text x="50" y="17" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ade80">STATUS: done</text>
  </g>

  <!-- Legend -->
  <g transform="translate(30, 530)">
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#8b949e">Legend:</text>
    <line x1="60" y1="-4" x2="90" y2="-4" stroke="#7b2ff7" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="95" y="0" font-family="monospace" font-size="10" fill="#7b2ff7">Leader → Hub</text>
    <line x1="200" y1="-4" x2="230" y2="-4" stroke="#00d2ff" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="235" y="0" font-family="monospace" font-size="10" fill="#00d2ff">Hub → Workers</text>
    <line x1="360" y1="-4" x2="390" y2="-4" stroke="#f5a623" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="395" y="0" font-family="monospace" font-size="10" fill="#f5a623">LAN Connection</text>
    <rect x="520" y="-10" width="12" height="12" rx="3" fill="#4ade80" opacity="0.3" stroke="#4ade80" stroke-width="0.8"/>
    <text x="537" y="0" font-family="monospace" font-size="10" fill="#4ade80">Messages</text>
  </g>

  <!-- Bottom branding -->
  <text x="500" y="580" text-anchor="middle" font-family="'Georgia', serif" font-size="14" fill="#e94560" opacity="0.5" letter-spacing="3">CODESTRA</text>
</svg>
